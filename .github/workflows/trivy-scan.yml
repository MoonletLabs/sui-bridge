name: Trivy Security Scan

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.34.2
        continue-on-error: true
        env:
          TRIVY_DISABLE_VEX_NOTICE: 'true'
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'json'
          output: 'trivy-results.json'
          exit-code: '0'
          severity: 'HIGH,CRITICAL'
          timeout: '10m'

      - name: Format Trivy results as Markdown summary
        if: always()
        run: |
          echo "## 🛡️ Trivy Vulnerability Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Type:** fs" >> $GITHUB_STEP_SUMMARY
          echo "**Severity Filter:** HIGH,CRITICAL" >> $GITHUB_STEP_SUMMARY
          echo "**Ignore Unfixed:** true" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f trivy-results.json ]; then
            # Check if there are any vulnerabilities
            if jq -e '.Results[]?.Vulnerabilities? | length > 0' trivy-results.json > /dev/null 2>&1; then
              echo "### 🔴 Vulnerabilities Found" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              
              # Count vulnerabilities by severity
              CRITICAL_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-results.json)
              HIGH_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-results.json)
              MEDIUM_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "MEDIUM")] | length' trivy-results.json)
              LOW_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "LOW")] | length' trivy-results.json)
              TOTAL_COUNT=$(jq '[.Results[]?.Vulnerabilities[]?] | length' trivy-results.json)
              
              echo "**Summary:**" >> $GITHUB_STEP_SUMMARY
              echo "- 🔴 Critical: $CRITICAL_COUNT" >> $GITHUB_STEP_SUMMARY
              echo "- 🟠 High: $HIGH_COUNT" >> $GITHUB_STEP_SUMMARY
              echo "- 🟡 Medium: $MEDIUM_COUNT" >> $GITHUB_STEP_SUMMARY
              echo "- 🔵 Low: $LOW_COUNT" >> $GITHUB_STEP_SUMMARY
              echo "- **Total:** $TOTAL_COUNT" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              
              echo "<details>" >> $GITHUB_STEP_SUMMARY
              echo "<summary>📋 Click to expand vulnerability details</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Target | Package | Vulnerability ID | Severity | Status | Installed Version | Fixed Version | Title |" >> $GITHUB_STEP_SUMMARY
              echo "|--------|---------|------------------|----------|--------|-------------------|---------------|-------|" >> $GITHUB_STEP_SUMMARY
              
              jq -r '
                .Results[]
                | select(.Vulnerabilities)
                | .Target as $target
                | .Vulnerabilities[]
                | "| \($target) | \(.PkgName) | [\(.VulnerabilityID)](\(.PrimaryURL // "#")) | \(.Severity) | \(.Status // "vulnerable") | \(.InstalledVersion // "-") | \(.FixedVersion // "-") | \(.Title | gsub("[|]"; "\\|") | .[0:100]) |"
              ' trivy-results.json >> $GITHUB_STEP_SUMMARY
              
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            else
              echo "### ✅ No vulnerabilities found!" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "All scanned targets are clean. Great work! 🎉" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "### ⚠️ Scan incomplete" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Trivy scan did not complete successfully. Results file not found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Trivy results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json
          retention-days: 30
